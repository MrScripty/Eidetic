pre-commit:
  parallel: true
  commands:
    ui-lint:
      run: cd ui && npm run lint

    ui-format-check:
      run: cd ui && npm run format:check

    ui-typecheck:
      run: cd ui && npm run typecheck

    rustfmt:
      glob: "*.rs"
      run: rustfmt --check {staged_files}

pre-push:
  commands:
    test:
      run: ./launcher.sh --test

commit-msg:
  commands:
    conventional:
      run: |
        commit_msg=$(cat {1})
        pattern="^(build|chore|ci|docs|feat|fix|perf|refactor|style|test)(\(.+\))?: .{1,}$"
        if ! echo "$commit_msg" | grep -qE "$pattern"; then
          echo "Invalid commit message format."
          echo "Expected: <type>(<scope>): <description>"
          exit 1
        fi
